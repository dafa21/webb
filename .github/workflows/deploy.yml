name: Deploy to VPS

on:
  push:
    branches:
      - main # Sesuaikan dengan branch utama Anda

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Pastikan direktori ada dan milik user
            sudo mkdir -p /var/www/dev-nurhealth
            sudo chown -R $USER:$USER /var/www/dev-nurhealth
            cd /var/www/dev-nurhealth
            
            # Clone langsung ke folder ini (tanda titik '.' di akhir sangat penting)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi
            
            # Jalankan dengan Docker
            docker compose down || true
            docker compose up -d --build
