name: Deploy to VPS

on:
  push:
    branches:
      - main # Sesuaikan dengan branch utama Anda

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Tentukan path target
            TARGET_DIR="/var/www/dev-nurhealth/webb"
            
            echo "--- Stopping existing app (Safe) ---"
            pm2 stop dev-nurhealth || true
            pm2 delete dev-nurhealth || true
            
            echo "--- Cleaning & Preparing directory ---"
            # Hapus folder target saja agar lebih presisi
            sudo rm -rf $TARGET_DIR
            sudo mkdir -p $TARGET_DIR
            sudo chown -R $USER:$USER $TARGET_DIR
            cd $TARGET_DIR
            
            echo "--- Cloning repository (to folder webb) ---"
            git clone https://github.com/dafa21/webb.git .
            
            echo "--- Installing dependencies ---"
            npm install
            
            echo "--- Building frontend ---"
            npm run build
            
            # Verifikasi build
            echo "--- Verifying dist folder ---"
            if [ -d "dist" ]; then
              echo "✅ Build success: dist folder found at $(pwd)/dist"
              ls -la dist | head -n 5
            else
              echo "❌ Build FAILED: dist folder missing!"
              ls -la
              exit 1
            fi
            
            echo "--- Setting up PM2 & starting app ---"
            sudo npm install -g pm2 tsx || true
            
            # Jalankan PM2 dengan CWD eksplisit mengarah ke folder webb
            NODE_ENV=production PORT=30002 pm2 start "npx tsx server.ts" \
              --name "dev-nurhealth" \
              --cwd $TARGET_DIR \
              --log-date-format "YYYY-MM-DD HH:mm:ss"
            
            pm2 save
            
            echo "🚀 Deployment Selesai di Port 30002 pada folder $TARGET_DIR"
