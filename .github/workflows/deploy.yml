name: Deploy to VPS

on:
  push:
    branches:
      - main # Sesuaikan dengan branch utama Anda

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Tentukan path target
            TARGET_DIR="/var/www/dev-nurhealth"
            
            echo "--- Stopping existing app ---"
            pm2 stop dev-nurhealth || true
            pm2 delete dev-nurhealth || true
            
            echo "--- Cleaning directory ---"
            sudo rm -rf $TARGET_DIR
            sudo mkdir -p $TARGET_DIR
            sudo chown -R $USER:$USER $TARGET_DIR
            cd $TARGET_DIR
            
            echo "--- Cloning repository ---"
            git clone https://github.com/dafa21/webb.git .
            
            echo "--- Installing dependencies ---"
            npm install
            
            echo "--- Building frontend ---"
            npm run build
            
            # Verifikasi build
            if [ -d "dist" ]; then
              echo "✅ Build success (dist folder found)"
            else
              echo "❌ Build FAILED (dist folder missing)"
              exit 1
            fi
            
            echo "--- Starting application ---"
            sudo npm install -g pm2 tsx || true
            NODE_ENV=production PORT=30002 pm2 start "npx tsx server.ts" --name "dev-nurhealth" --log-date-format "YYYY-MM-DD HH:mm:ss"
            pm2 save
            
            echo "🚀 Deployment Selesai di Port 30002!"
