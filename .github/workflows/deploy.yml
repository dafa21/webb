name: Deploy to VPS

on:
  push:
    branches:
      - main # Sesuaikan dengan branch utama Anda

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Tentukan path target
            TARGET_DIR="/var/www/dev-nurhealth"
            
            # Hapus folder lama agar bersih (Krusial agar git clone . tidak gagal)
            sudo rm -rf $TARGET_DIR
            sudo mkdir -p $TARGET_DIR
            sudo chown -R $USER:$USER $TARGET_DIR
            cd $TARGET_DIR
            
            # Clone repo public (tanda titik '.' sangat penting)
            git clone https://github.com/dafa21/webb.git .
            
            # Instalasi dependensi & Build frontend
            npm install
            npm run build
            
            # Setup PM2 & TSX globally jika belum ada
            sudo npm install -g pm2 tsx || true
            
            # Stop proses lama jika ada agar tidak bentrok
            pm2 delete dev-nurhealth || true
            
            # Jalankan dengan environment production & Port 30002
            # Kita gunakan npx tsx agar menggunakan server.ts secara langsung
            NODE_ENV=production PORT=30002 pm2 start "npx tsx server.ts" --name "dev-nurhealth" --log-date-format "YYYY-MM-DD HH:mm:ss"
            
            # Simpan konfigurasi PM2 agar auto-start saat reboot
            pm2 save
            
            echo "🚀 Deployment Selesai! Aplikasi berjalan di Port 30002"
